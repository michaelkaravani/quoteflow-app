name: quoteflow
description: "QuoteFlow - Professional quote generation app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  cloud_functions: ^5.3.4
  file_picker: ^10.3.3
  intl: ^0.19.0
  path_provider: ^2.1.5
  open_file: ^3.5.11
  pdf: ^3.12.0
  syncfusion_flutter_pdf: ^26.2.14
  # syncfusion_flutter_pdfviewer removed - v26 incompatible with AGP 9+/jcenter removal
  # Will add back with a newer version when needed

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
